name: Validate Hub Entries

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install .

      - name: Validate all dataset entries
        run: python scripts/validate_all.py

      - name: Check generated registry index
        run: python scripts/build_index.py --check
